# FeatureLiftBench shared agent config.
# Secrets live in .env (never commit .env).
#
# Fresh clone: ./setup.sh creates harness/config/agents.toml from this file.
# Switch models: AGENT_PROFILE=deepseek_v4_flash ./run.sh  or  --agent-profile

profile = "deepseek_v4_pro"
env_file = ".env"

[profiles.deepseek_v4_pro]
model = "deepseek/deepseek-v4-pro"
agent_bin = "mini"
api_key_env = "FEATURELIFTBENCH_API_KEY"
api_base_env = "FEATURELIFTBENCH_API_BASE"
cost_limit = "0"
call_limit = "0"

[profiles.deepseek_v4_flash]
model = "deepseek/deepseek-v4-flash"
agent_bin = "mini"
api_key_env = "FEATURELIFTBENCH_API_KEY"
api_base_env = "FEATURELIFTBENCH_API_BASE"
cost_limit = "0"
call_limit = "0"

[profiles.openhands_deepseek_v4_flash]
model = "deepseek/deepseek-v4-flash"
api_key_env = "FEATURELIFTBENCH_API_KEY"
api_base_env = "FEATURELIFTBENCH_API_BASE"
cost_limit = "0"
call_limit = "0"
openhands_command = "openhands --headless --override-with-envs --exit-without-confirmation -f {prompt_file} --json"

# --- Local vLLM (OpenAI-compatible; key can be dummy) ---

[profiles.gpt_oss_120b_vllm]
model = "openai/GPT-OSS-120B"
agent_bin = "mini"
api_key_env = "VLLM_GPT_OSS_120B_API_KEY"
api_base_env = "VLLM_GPT_OSS_120B_API_BASE"
cost_limit = "0"
call_limit = "0"

[profiles.qwen3_coder_30b_vllm]
model = "openai/Qwen3-Coder-30B-A3B-Instruct"
agent_bin = "mini"
api_key_env = "VLLM_QWEN3_CODER_30B_API_KEY"
api_base_env = "VLLM_QWEN3_CODER_30B_API_BASE"
cost_limit = "0"
call_limit = "0"

