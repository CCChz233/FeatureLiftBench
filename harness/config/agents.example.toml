# FeatureLiftBench shared agent config.
# Copy this file to harness/config/agents.toml and keep secrets in .env.
#
# One profile = one reproducible model + endpoint + key env var.
# Switch models with: --agent-profile <name>
#
# api_base must be the OpenAI-compatible ROOT (e.g. https://api.example.com/v1).
# Do NOT include /chat/completions — mini-swe-agent / LiteLLM append that path.

profile = "deepseek_v4_flash"
env_file = ".env"

# --- DeepSeek official API (Flash / Pro share FEATURELIFTBENCH_* in .env) ---

[profiles.deepseek_v4_flash]
model = "deepseek/deepseek-v4-flash"
# agent_bin = "/path/to/conda/envs/miniswe/bin/mini"
api_key_env = "FEATURELIFTBENCH_API_KEY"
api_base_env = "FEATURELIFTBENCH_API_BASE"
cost_limit = "0"
call_limit = "0"

[profiles.deepseek_v4_pro]
model = "deepseek/deepseek-v4-pro"
# agent_bin = "/path/to/conda/envs/miniswe/bin/mini"
api_key_env = "FEATURELIFTBENCH_API_KEY"
api_base_env = "FEATURELIFTBENCH_API_BASE"
cost_limit = "0"
call_limit = "0"

# --- SiliconFlow (shared SILICONFLOW_* in .env) ---
# Use api_base_env so FEATURELIFTBENCH_API_BASE does not override these profiles.

[profiles.nex_n2_pro]
model = "openai/nex-agi/Nex-N2-Pro"
api_base_env = "SILICONFLOW_API_BASE"
api_key_env = "SILICONFLOW_API_KEY"
# agent_bin = "/path/to/conda/envs/miniswe/bin/mini"
cost_limit = "0"
call_limit = "0"

[profiles.qwen3_6_27b]
model = "openai/Qwen/Qwen3.6-27B"
api_base_env = "SILICONFLOW_API_BASE"
api_key_env = "SILICONFLOW_API_KEY"
# agent_bin = "/path/to/conda/envs/miniswe/bin/mini"
cost_limit = "0"
call_limit = "0"

# --- Generic OpenAI-compatible (template) ---

[profiles.default]
model = "openai/gpt-5.4-mini"
api_key_env = "FEATURELIFTBENCH_API_KEY"
api_base_env = "FEATURELIFTBENCH_API_BASE"
cost_limit = "10.00"
call_limit = "0"

[profiles.openai_compatible]
model = "openai/gpt-5.4-mini"
api_key_env = "FEATURELIFTBENCH_API_KEY"
api_base_env = "FEATURELIFTBENCH_API_BASE"
cost_limit = "10.00"
call_limit = "0"
