# FeatureLiftBench shared agent config.
# Secrets live in .env (never commit .env).
#
# Fresh clone: ./setup.sh creates harness/config/agents.toml from this file.
# Switch models: AGENT_PROFILE=deepseek_v4_flash ./run.sh  or  --agent-profile

profile = "deepseek_v4_pro"
env_file = ".env"

[profiles.deepseek_v4_pro]
model = "deepseek/deepseek-v4-pro"
agent_bin = "mini"
api_key_env = "FEATURELIFTBENCH_API_KEY"
api_base_env = "FEATURELIFTBENCH_API_BASE"
cost_limit = "0"
call_limit = "0"

[profiles.deepseek_v4_flash]
model = "deepseek/deepseek-v4-flash"
agent_bin = "mini"
api_key_env = "FEATURELIFTBENCH_API_KEY"
api_base_env = "FEATURELIFTBENCH_API_BASE"
cost_limit = "0"
call_limit = "0"

[profiles.nex_n2_pro]
model = "openai/nex-agi/Nex-N2-Pro"
agent_bin = "mini"
api_base_env = "SILICONFLOW_API_BASE"
api_key_env = "SILICONFLOW_API_KEY"
cost_limit = "0"
call_limit = "0"

[profiles.qwen3_6_27b]
model = "openai/Qwen/Qwen3.6-27B"
agent_bin = "mini"
api_base_env = "SILICONFLOW_API_BASE"
api_key_env = "SILICONFLOW_API_KEY"
cost_limit = "0"
call_limit = "0"

[profiles.default]
model = "openai/gpt-5.4-mini"
agent_bin = "mini"
api_key_env = "FEATURELIFTBENCH_API_KEY"
api_base_env = "FEATURELIFTBENCH_API_BASE"
cost_limit = "10.00"
call_limit = "0"

[profiles.openai_compatible]
model = "openai/gpt-5.4-mini"
agent_bin = "mini"
api_key_env = "FEATURELIFTBENCH_API_KEY"
api_base_env = "FEATURELIFTBENCH_API_BASE"
cost_limit = "10.00"
call_limit = "0"
