# Canonical pinned specs for benchmark task requirements.lock entries.
# Used by bootstrap_vendor_wheels.py and sync_task_locks tooling.

[sanity]
text-unidecode = "text-unidecode==1.3"

[packages]
attrs = "attrs==24.2.0"
annotated-types = "annotated-types==0.7.0"
idna = "idna==3.7"
jsonschema-specifications = "jsonschema-specifications==2024.10.1"
markupsafe = "MarkupSafe==2.1.5"
marshmallow = "marshmallow==3.22.0"
mdurl = "mdurl==0.1.2"
multidict = "multidict==6.0.4"
ply = "ply==3.11"
propcache = "propcache==0.4.1"
pydantic = "pydantic==2.9.2"
pydantic-core = "pydantic_core==2.23.4"
python-dateutil = "python-dateutil==2.9.0.post0"
pyyaml = "PyYAML==6.0.2"
referencing = "referencing==0.35.1"
rpds-py = "rpds-py==0.20.0"
six = "six==1.17.0"
sortedcontainers = "sortedcontainers==2.4.0"
typing-extensions = "typing_extensions==4.12.2"
typing-inspect = "typing-inspect==0.9.0"
typing-inspection = "typing-inspection==0.4.2"
wrapt = "wrapt==1.16.0"
lazy-object-proxy = "lazy-object-proxy==1.12.0"

[transitive]
python-dateutil = ["six"]
pydantic = ["pydantic-core", "annotated-types", "typing-extensions", "typing-inspection"]
referencing = ["attrs"]
jsonschema-specifications = ["referencing", "rpds-py", "attrs"]
wrapt = ["lazy-object-proxy"]

[aliases]
# metadata allowed_dependencies may use short names; lock uses PyPI distribution names.
rpds = "rpds-py"
